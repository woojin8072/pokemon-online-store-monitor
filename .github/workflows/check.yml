name: 포켓몬스토어 재고 감시

on:
     schedule:
       - cron: '*/30 * * * *'  # 백업: 30분마다 (cron-job.org 죽으면 동작)
     workflow_dispatch:  # 수동 실행 버튼
     repository_dispatch:
       types: [pokemon-check]

concurrency:
  group: stock-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # state.json 커밋용
    timeout-minutes: 5

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 캐시
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Playwright 브라우저 설치
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Playwright 시스템 의존성
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: 재고 체크 실행
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}  # 비워두면 SMTP_USER로 보냄
        run: python check_stock.py

      - name: 상태 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git add state.json
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "변경사항 없음"
          fi
