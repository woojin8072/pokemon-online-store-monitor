name: 롯데마트 재고 감시

on:
  schedule:
    - cron: '*/15 * * * *'  # 15분마다 실행
  workflow_dispatch:
    inputs:
      debug:
        description: '디버그 모드 (단계별 스크린샷 저장)'
        type: boolean
        default: false

concurrency:
  group: lotte-stock-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 캐시
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Playwright 브라우저 설치
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Playwright 시스템 의존성
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: 재고 체크 실행
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' && '1' || '0' }}
        run: python lotte_check.py

      - name: 디버그 스크린샷 업로드
        if: always() && github.event.inputs.debug == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lotte-debug-screenshots
          path: debug/
          retention-days: 7
          if-no-files-found: ignore

      - name: 상태 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain lotte_state.json 2>/dev/null)" ]]; then
            git add lotte_state.json
            git commit -m "chore: update lotte state [skip ci]"
            git push
          else
            echo "변경사항 없음"
          fi
